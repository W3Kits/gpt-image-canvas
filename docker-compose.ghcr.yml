services:
  app:
    image: ${IMAGE:-ghcr.io/mrslimslim/gpt-image-canvas:latest}
    env_file:
      - path: .env
        required: false
    environment:
      HOST: 0.0.0.0
      PORT: ${PORT:-8787}
      DATA_DIR: /app/data
      PROMPT_POOL_DIR: ${PROMPT_POOL_DIR:-/app/prompt-pool-data}
      SQLITE_JOURNAL_MODE: ${SQLITE_JOURNAL_MODE:-DELETE}
      SQLITE_LOCKING_MODE: ${SQLITE_LOCKING_MODE:-EXCLUSIVE}
    ports:
      - "${PORT:-8787}:${PORT:-8787}"
    volumes:
      - ./data:/app/data
